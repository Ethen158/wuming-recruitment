# ===== 武鸣招聘 - Nginx站点配置 =====
# 同时支持 HTTP 和 HTTPS

# --- HTTP ---
server {
    listen 80;
    listen [::]:80;
    server_name job.ailrabbit.cn;

    # ACME challenge for Let's Encrypt renewal (future)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 静态资源
    location /static/ {
        alias /home/ubuntu/hermes-web/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        etag on;
        access_log off;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # 动态请求
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/html text/javascript application/javascript application/json application/xml image/svg+xml;
}

# --- HTTPS (自签名证书) ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name job.ailrabbit.cn;

    # 自签名证书
    ssl_certificate /etc/letsencrypt/live/job.ailrabbit.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/job.ailrabbit.cn/privkey.pem;

    # SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # 安全 Headers
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 日志
    access_log /var/log/nginx/wuming-recruit.access.log;
    error_log /var/log/nginx/wuming-recruit.error.log;

    # 静态资源
    location /static/ {
        alias /home/ubuntu/hermes-web/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        etag on;
        access_log off;
    }

    # ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # 动态请求
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/html text/javascript application/javascript application/json application/xml image/svg+xml;
}
