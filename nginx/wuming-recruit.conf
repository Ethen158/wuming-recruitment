# ===== 武鸣招聘 - Nginx站点配置 =====
# 部署到 /etc/nginx/sites-available/wuming-recruit.conf
# ln -s /etc/nginx/sites-available/wuming-recruit.conf /etc/nginx/sites-enabled/

upstream wuming_app {
    server 127.0.0.1:8080;
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    listen [::]:80;
    server_name job.ailrabbit.cn wuming.gxlemai.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主站点
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name job.ailrabbit.cn wuming.gxlemai.com;

    # SSL 证书（Let's Encrypt）
    ssl_certificate /etc/letsencrypt/live/job.ailrabbit.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/job.ailrabbit.cn/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/job.ailrabbit.cn/chain.pem;

    # SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # 安全 Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://zz.bdstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://api.weixin.qq.com; frame-src 'none'; object-src 'none';" always;

    # 日志
    access_log /var/log/nginx/wuming-recruit.access.log;
    error_log /var/log/nginx/wuming-recruit.error.log;

    # ===== 静态资源（Nginx直接服务） =====
    location /static/ {
        alias /home/ubuntu/hermes-web/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        etag on;
        access_log off;
    }

    # ===== 动态请求（代理到Uvicorn） =====
    location / {
        proxy_pass http://wuming_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # HTML 不缓存
        add_header Cache-Control "no-cache";
    }

    # ===== 压缩配置 =====
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/html
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # brotli 压缩（需安装 libnginx-mod-http-brotli）
    # brotli on;
    # brotli_comp_level 6;
    # brotli_min_length 1024;
    # brotli_types text/plain text/css text/html text/javascript application/javascript application/json image/svg+xml;

    # SSL 证书自动续期（certbot）
    location ~ ^/\.well-known/acme-challenge/ {
        root /var/www/html;
    }
}
