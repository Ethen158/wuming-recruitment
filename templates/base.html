<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Hermes 面板{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
    <div class="page">
        {% block content %}{% endblock %}
    </div>

    <nav class="nav">
        <a href="/" class="{% block nav_home %}{% endblock %}">
            <span class="nav-icon">🏠</span>首页
        </a>
        <a href="/funds" class="{% block nav_funds %}{% endblock %}">
            <span class="nav-icon">💰</span>基金
        </a>
        <a href="/recruitment" class="{% block nav_recruit %}{% endblock %}">
            <span class="nav-icon">🏭</span>招聘
        </a>
        <a href="/training" class="{% block nav_training %}{% endblock %}">
            <span class="nav-icon">📚</span>培训
        </a>
    </nav>
</body>
</html>
